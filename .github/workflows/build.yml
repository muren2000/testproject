name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Создать релиз с этим тегом (например v1.2.0); пусто — только сборка"
        required: false
        default: ""

jobs:
  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m unittest discover tests -v

  build-macos:
    name: Build macOS app (Apple Silicon)
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build with PyInstaller
        run: bash scripts/build-macos.sh
      - name: Package .app (ditto preserves the bundle)
        run: |
          ditto -c -k --keepParent "dist/PDF Compress.app" "PDF-Compress-macOS-arm64.zip"
          cp dist/pdfcompress pdfcompress-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: PDF-Compress-macOS-arm64
          path: |
            PDF-Compress-macOS-arm64.zip
            pdfcompress-macos-arm64

  build-windows:
    name: Build Windows exe
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build with PyInstaller
        shell: cmd
        run: scripts\build-windows.bat
      - uses: actions/upload-artifact@v4
        with:
          name: PDF-Compress-Windows
          path: |
            dist/PDF Compress.exe
            dist/pdfcompress.exe

  release:
    name: Attach binaries to release
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: |
            dist/PDF-Compress-macOS-arm64.zip
            dist/pdfcompress-macos-arm64
            dist/PDF Compress.exe
            dist/pdfcompress.exe
